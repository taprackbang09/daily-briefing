name: Daily Briefing Generation

on:
  schedule:
    # Runs at 05:00 UTC (08:00 AM Kyiv time)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

permissions:
  contents: write # Required to push the generated HTML files back to the repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded to Node 24

      - name: Install dependencies
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: npm install

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node briefing.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage generated briefing pages and the root redirect.
          git add briefing/*.html index.html || true

          # Commit only if there are actual changes.
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Update Daily Briefing: $(date +'%Y-%m-%d')"
            git push
          fi
          fi