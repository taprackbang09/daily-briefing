name: Daily Briefing Generation

on:
  schedule:
    # This runs at 05:00 UTC (8:00 AM Kyiv time)
    - cron: '0 5 * * *'
  workflow_dispatch: # This allows you to run it manually from the "Actions" tab

permissions:
  contents: write # Allows the bot to push the HTML files back to your repo

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node briefing.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing/
          git commit -m "Update Daily Briefing: $(date +'%Y-%m-%d')" || exit 0
          git push
